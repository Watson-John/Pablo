name: photo_native
description: Pablo native backend Flutter plugin (FFI + texture registrar).
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffigen: ^12.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: PhotoNativePlugin
      windows:
        pluginClass: PhotoNativePlugin
      linux:
        pluginClass: PhotoNativePlugin
