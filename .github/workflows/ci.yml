name: CI

# Smoke-builds the Pablo Flutter frontend on macOS, Windows, and Linux so every
# slice is validated on all three desktop targets. The native photo_native
# plugin's per-platform CMake compiles native/core directly and only needs the
# standard desktop toolchains (GTK3 on Linux, MSVC on Windows, CocoaPods on
# macOS) — no vcpkg for the app build (vcpkg/gtest are for the standalone
# native test build only).

on:
  push:
    branches: [main, 'pablo-v*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pablo

env:
  FLUTTER_VERSION: '3.41.2'
  FLUTTER_CHANNEL: stable

jobs:
  # ── Fast, reliable per-slice gate: analyze + tests on all three OSes ──
  analyze:
    name: analyze (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Analyze (fail on any issue)
        run: flutter analyze
      # Runs the WHOLE suite on each OS in the matrix. This is the cross-OS gate
      # for the filesystem-touching reorganizer integration tests
      # (test/reorganizer_property_test.dart, file_ops_test.dart,
      # library_mover_test.dart, reorganize_controller_test.dart), whose behavior
      # — path separators, case-sensitivity, reserved names, MAX_PATH — differs by
      # platform. Keep all three OSes here; do not collapse to one.
      - name: Tests
        run: flutter test --reporter compact

  # ── Deeper smoke: actually build the desktop app (compiles the native
  #    texture seam) on each OS's native runner ──
  build:
    name: build ${{ matrix.target }} (${{ matrix.os }})
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - name: Linux desktop toolchain + GTK (native plugin deps)
        if: matrix.os == 'ubuntu-latest'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config libvips-dev
          echo "PHOTO_REQUIRE_VIPS=1" >> "$GITHUB_ENV"
      - name: Install libvips (macOS real-decode path)
        if: matrix.target == 'macos'
        run: brew install vips
      - name: Install libvips (Windows real-decode path)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          # Prebuilt libvips Windows dev bundle (MSVC import libs). Its .pc files
          # hardcode non-relocatable build paths, so the plugin CMake consumes it
          # by full path via PHOTO_VIPS_ROOT rather than pkg-config.
          $rel = Invoke-RestMethod "https://api.github.com/repos/libvips/build-win64-mxe/releases/latest" -Headers @{ 'User-Agent' = 'pablo-ci' }
          $asset = $rel.assets | Where-Object { $_.name -like 'vips-dev-x64-web-*.zip' -and $_.name -notlike '*static*' -and $_.name -notlike '*ffi*' } | Select-Object -First 1
          if (-not $asset) { throw "no vips-dev-x64-web asset in release $($rel.tag_name)" }
          Write-Host "libvips asset: $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile vips.zip
          Expand-Archive vips.zip -DestinationPath C:\vips -Force
          $dev = (Get-ChildItem C:\vips -Directory | Where-Object { $_.Name -like 'vips-dev-*' } | Select-Object -First 1).FullName
          Write-Host "vips dev dir: $dev"
          "PHOTO_VIPS_ROOT=$dev"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PHOTO_REQUIRE_VIPS=1"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$dev\bin"              | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Enable ${{ matrix.target }} desktop
        run: flutter config --enable-${{ matrix.target }}-desktop
      - run: flutter pub get
      - name: Set up native plugin symlinks (macOS pod build)
        if: matrix.target == 'macos'
        working-directory: .
        run: bash tools/setup-plugin-symlinks.sh
      - name: Build ${{ matrix.target }} (debug)
        run: flutter build ${{ matrix.target }} --debug
