name: CI

# Smoke-builds the Pablo Flutter frontend on macOS, Windows, and Linux so every
# slice is validated on all three desktop targets. The native photo_native
# plugin's per-platform CMake compiles native/core directly and only needs the
# standard desktop toolchains (GTK3 on Linux, MSVC on Windows, CocoaPods on
# macOS) — no vcpkg for the app build (vcpkg/gtest are for the standalone
# native test build only).

on:
  push:
    branches: [main, 'pablo-v*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pablo

env:
  FLUTTER_VERSION: '3.41.2'
  FLUTTER_CHANNEL: stable

jobs:
  # ── Fast, reliable per-slice gate: analyze + tests on all three OSes ──
  analyze:
    name: analyze (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Analyze (fail on any issue)
        run: flutter analyze
      - name: Tests
        run: flutter test --reporter compact
        # Frontend scaffolding phase: tolerate "no tests found" without failing
        # the gate. Tighten to a hard gate once a widget-test suite exists.
        continue-on-error: true

  # ── Deeper smoke: actually build the desktop app (compiles the native
  #    texture seam) on each OS's native runner ──
  build:
    name: build ${{ matrix.target }} (${{ matrix.os }})
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - name: Linux desktop toolchain + GTK (native plugin deps)
        if: matrix.os == 'ubuntu-latest'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config libvips-dev
      - name: Install libvips (macOS real-decode path)
        if: matrix.target == 'macos'
        run: brew install vips
      - name: Enable ${{ matrix.target }} desktop
        run: flutter config --enable-${{ matrix.target }}-desktop
      - run: flutter pub get
      - name: Set up native plugin symlinks (macOS pod build)
        if: matrix.target == 'macos'
        working-directory: .
        run: bash tools/setup-plugin-symlinks.sh
      - name: Build ${{ matrix.target }} (debug)
        run: flutter build ${{ matrix.target }} --debug
