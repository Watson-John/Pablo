name: dedup CI

# Compile smoke-test for the standalone near-duplicate detector (native/dedup).
# Heavier than the Flutter CI — it builds OpenCV(+contrib) via vcpkg — so it is
# PATH-FILTERED to native/dedup changes and persists vcpkg's binary cache (the
# 'files' provider + actions/cache) so only the first run pays the full
# dependency build. (vcpkg's old 'x-gha' provider was removed upstream in 2025.)
#
# The optional features (faiss / raw / ONNX Runtime) are OFF here to keep the
# build tractable; the code compiles in its fallback configuration. Enable them
# locally via the CMake presets for a full build.

on:
  push:
    branches: [main, 'pablo-v*', 'feat/dedup-*']
    paths: ['native/dedup/**', '.github/workflows/dedup-ci.yml']
  pull_request:
    paths: ['native/dedup/**', '.github/workflows/dedup-ci.yml']
  workflow_dispatch:

concurrency:
  group: dedup-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Persist vcpkg's 'files' binary cache across runs so only the first build
      # compiles opencv4[contrib] et al. from source.
      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('native/dedup/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake pkg-config autoconf automake libtool

      - name: Configure + build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -S native/dedup -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_MANIFEST_FEATURES="" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Configure + build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cmake -S native/dedup -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_FEATURES="" `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel
